spring.application.name=achievetrack-backend
server.port=5000

spring.datasource.url=jdbc:mysql://localhost:3306/achievetrack?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=Varshika@411
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

spring.jackson.serialization.write-dates-as-timestamps=false
spring.mvc.throw-exception-if-no-handler-found=true
spring.servlet.multipart.max-file-size=5MB
