app.jwt.secret=achievetrack-local-dev-secret
app.jwt.expiration=604800000
app.cors.allowed-origin-patterns=http://localhost:*,http://127.0.0.1:*,http://192.168.*:*,http://10.*:*,http://172.*:*
app.upload.dir=uploads
